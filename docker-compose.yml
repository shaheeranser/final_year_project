services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: server/.env
    environment:
      - DEBUG=provider:*
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - examnet
      - moodle-docker_default
    links:
      - mongo:mongo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns_search: .

  mongo:
    image: mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - examnet
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - examnet  # Add this if your app needs to upload media files seamlessly
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} && /usr/bin/mc mb --ignore-existing myminio/$${MINIO_BUCKET_NAME} "
    env_file: server/.env
    networks:
      - default

  reverse-proxy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - app
    networks:
      - examnet  # Essential if Moodle routes to the app via the proxy domain

volumes:
  mongo_data:
  minio_data:
  caddy_data:
  caddy_config:

networks:
  default:
  examnet:
    external: true
  moodle-docker_default:
    external: true